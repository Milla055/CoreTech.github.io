<app-header></app-header>

<div class="discounts-container">

  <!-- Hero -->
  <div class="hero-banner">
    <h1 class="hero-title">Akciós Termékek</h1>
    <p class="hero-subtitle">Korlátozott ideig érvényes ajánlatok – ne hagyd ki!</p>
  </div>

  <!-- Loading -->
  <div class="loading-container" *ngIf="loading">
    <div class="spinner"></div>
    <p>Akciós termékek betöltése...</p>
  </div>

  <!-- Content with Filter -->
  <div class="content-wrapper" *ngIf="!loading">
    
    <!-- Filter Sidebar -->
    <aside class="filter-sidebar">
      <app-filter (filterChange)="onFilterChange($event)"></app-filter>
    </aside>

    <!-- Products Section -->
    <section class="products-section">
      <h2 class="section-title">{{ filteredProducts.length }} akciós termék</h2>
      
      <div class="products-grid" *ngIf="filteredProducts.length > 0">
        <app-productcard
          *ngFor="let product of filteredProducts"
          [product]="product">
        </app-productcard>
      </div>

      <div class="no-results" *ngIf="filteredProducts.length === 0">
        <p>Nincs találat a szűrési feltételeknek megfelelően.</p>
      </div>
    </section>

  </div>

</div>

<app-footer></app-footer>
