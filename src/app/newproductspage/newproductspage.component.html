<div class="newproducts-container">
    <app-header></app-header>
  
  <!-- Hero Banner -->
  <div class="hero-banner">
    <h1 class="hero-title">Újdonságok</h1>
    <p class="hero-subtitle">Fedezd fel legújabb termékeinket!</p>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="spinner"></div>
    <p>Termékek betöltése...</p>
  </div>

  <!-- Content -->
  <div *ngIf="!isLoading" class="content-wrapper">
    
    <!-- Filter Sidebar -->
    <aside class="filter-sidebar">
      <app-filter (filterChange)="onFilterChange($event)"></app-filter>
    </aside>

    <!-- Products Section -->
    <section class="products-section">
      <h2 class="section-title">Legújabb termékek ({{ filteredProducts.length }})</h2>
      
      <div class="products-grid" *ngIf="filteredProducts.length > 0">
        <app-productcard 
          *ngFor="let product of filteredProducts" 
          [product]="product">
        </app-productcard>
      </div>

      <div class="no-results" *ngIf="filteredProducts.length === 0">
        <p>Nincs találat a szűrési feltételeknek megfelelően.</p>
      </div>
    </section>

  </div>
<app-footer></app-footer>
</div>
