<!-- Success Notification -->
<div class="success-notification" *ngIf="notification && notification.type === 'success'">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
    <polyline points="20 6 9 17 4 12"></polyline>
  </svg>
  <span>{{ notification.message }}</span>
</div>

<!-- Error Notification -->
<div class="error-notification" *ngIf="notification && notification.type === 'error'">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
    <circle cx="12" cy="12" r="10"></circle>
    <line x1="12" y1="8" x2="12" y2="12"></line>
    <line x1="12" y1="16" x2="12.01" y2="16"></line>
  </svg>
  <span>{{ notification.message }}</span>
</div>

<!-- Newsletter Card -->
<div class="newsletter-card">
  <h3>Értesülj a legfrissebb hírekről és újdonságokról!</h3>
  <p>Iratkozz fel a hírlevelünkre</p>
  
  <div class="newsletter-form">
    <input 
      type="email" 
      [(ngModel)]="email" 
      placeholder="Email címed"
      [disabled]="isLoading"
      (keyup.enter)="subscribe()"
    />
    <button 
      (click)="subscribe()" 
      [disabled]="isLoading">
      {{ isLoading ? 'Küldés...' : 'Feliratkozom!' }}
    </button>
  </div>
</div>
